!
hostname R10
!
no ip domain lookup
!
! --- Interface Configuration ---
!
interface Ethernet3/0
 description Link to EIGRP AS-2 Backbone
 bandwidth 100000
 ip address 192.168.20.4 255.255.255.0
 delay 10
 duplex half
 no shutdown
!
! --- Routing Configuration ---
!
router eigrp 2
 network 192.168.20.0
!
end
