!
hostname R2
!
no ip domain lookup
!
! --- Interface Configuration ---
!
interface Ethernet3/0
 description Connection to EIGRP AS-1 Network
 bandwidth 100000
 ip address 192.168.10.4 255.255.255.0
 delay 10
 duplex half
 no shutdown
!
! --- Routing Configuration ---
!
router eigrp 1
 network 192.168.10.0
!
end
