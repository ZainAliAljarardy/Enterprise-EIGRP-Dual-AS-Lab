!
hostname R4
!
no ip domain lookup
!
! --- DHCP Configuration ---
ip dhcp pool Net70
 network 192.168.70.0 255.255.255.0
 default-router 192.168.70.254
!
! --- Interface Configuration ---
!
interface Ethernet3/0
 description Link to EIGRP AS-1 Backbone
 bandwidth 100000
 ip address 192.168.10.3 255.255.255.0
 delay 10
 duplex half
 no shutdown
!
interface Ethernet3/1
 description Local LAN - Gateway for Net70
 bandwidth 100000
 ip address 192.168.70.254 255.255.255.0
 delay 10
 duplex half
 no shutdown
!
! --- Routing Configuration ---
!
router eigrp 1
 network 192.168.10.0
 network 192.168.70.0
 passive-interface Ethernet3/1
!
end
