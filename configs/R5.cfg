!
hostname R5
!
no ip domain lookup
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description Link to AS 2 (R7)
 ip address 14.14.14.2 255.255.255.252
 negotiation auto 
 no shutdown
!
interface GigabitEthernet1/0
 description Link to AS 1 (R3)
 ip address 11.11.11.2 255.255.255.252
 negotiation auto
 no shutdown
!
! --- Routing Configuration (Redistribution) ---
!
router eigrp 1
 network 11.11.11.0 0.0.0.3
 redistribute eigrp 2
!
router eigrp 2
 network 14.14.14.0 0.0.0.3
 redistribute eigrp 1
!
end
