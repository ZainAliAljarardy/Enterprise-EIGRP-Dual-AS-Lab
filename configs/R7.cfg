!
hostname R7
!
no ip domain lookup
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description Link to R6 (Core/ASBR)
 ip address 13.13.13.1 255.255.255.252
 duplex full
 speed 1000
 no shutdown
!
interface GigabitEthernet1/0
 description Link to R5 (Core/ASBR)
 bandwidth 100000
 ip address 14.14.14.1 255.255.255.252
 delay 10
 no shutdown
!
interface Ethernet3/0
 description Internal Link to AS 2 Backbone (R8/R9/R10)
 bandwidth 100000
 ip address 192.168.20.1 255.255.255.0
 delay 10
 duplex half
 no shutdown
!
! --- Routing Configuration ---
!
router eigrp 2
 network 13.13.13.0 0.0.0.3
 network 14.14.14.0 0.0.0.3
 network 192.168.20.0
!
end
